{% extends 'base.html' %}

{% block title %}Login - Authenticity Validator{% endblock %}

{% block content %}
<div class="login-container glass-panel">
    <h2>Login to Dashboard</h2>
    <form method="POST" action="{{ url_for('login') }}">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" class="form-control" required placeholder="Enter username">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" class="form-control" required placeholder="Enter password">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-bottom: 1rem;">Access System</button>
    </form>
    
    <div style="text-align: center; margin: 1rem 0; color: var(--border);">OR</div>
    
    <a href="{{ url_for('login_google') }}" class="btn btn-google" style="width: 100%;">
        <i class="fa-brands fa-google"></i> Continue with Google
    </a>
    
    <p style="text-align: center; margin-top: 1.5rem; color: var(--text-muted); font-size: 0.875rem;">
        Don't have an account? <a href="{{ url_for('register') }}" style="color: var(--primary); text-decoration: none;">Sign up here</a>
    </p>
</div>
{% endblock %}
